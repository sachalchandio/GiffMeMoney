# ---------------------------------------------------------------------------
# nginx config for the GiffMeMoney frontend (static SPA served by nginx:alpine).
#
# Responsibilities:
#   1. Serve the built Vite SPA from /usr/share/nginx/html.
#   2. Fall back to /index.html for client-side (React Router) routes so a deep
#      link or refresh on e.g. /asset/AAPL resolves to the app shell, not 404.
#   3. OPTIONALLY reverse-proxy /api and /ws to the backend service. This is
#      only used when the frontend is built WITHOUT a VITE_API_URL (or with
#      VITE_API_URL pointing at this same origin) so the browser talks to the
#      backend through nginx on a single origin. The default docker-compose
#      build instead bakes VITE_API_URL=http://localhost:8000 into the bundle,
#      in which case the browser calls the backend directly and these proxy
#      blocks are simply unused. Both modes are documented in docs/DEPLOY.md.
#
# The backend host/port below ("backend:8000") matches the compose service name.
# ---------------------------------------------------------------------------

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets for a smaller transfer.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml;

    # --- Hashed build assets: safe to cache aggressively (content-hashed names).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- API reverse proxy (single-origin mode; see header note).
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- WebSocket reverse proxy (live price feed at /ws).
    location /ws {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSockets are long-lived: don't time them out prematurely.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- SPA fallback: every other path serves the app shell so React Router
    #     can handle client-side routing (deep links + refresh never 404).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
